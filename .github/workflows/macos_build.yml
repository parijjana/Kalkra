name: Build macOS Executable
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies (Packages)
        run: |
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/pubspec.yaml" ]; then
              echo "Getting dependencies for $dir"
              cd "$dir"
              flutter pub get
              cd ../..
            fi
          done

      - name: Install Dependencies (App)
        run: |
          cd kalkra_app
          flutter pub get

      - name: Enable macOS support
        run: flutter config --enable-macos-desktop

      - name: Refresh macOS Project
        run: |
          cd kalkra_app
          flutter create --platforms=macos .

      - name: Build macOS Release
        run: |
          cd kalkra_app
          flutter build macos --release --no-codesign -v

      - name: Zip Build
        run: |
          cd kalkra_app/build/macos/Build/Products/Release
          zip -r ../../../../Kalkra-macOS.zip Kalkra.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalkra-macOS
          path: Kalkra-macOS.zip
