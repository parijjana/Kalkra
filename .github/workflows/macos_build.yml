name: Build macOS Executable
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS support
        run: flutter config --enable-macos-desktop

      - name: Get Dependencies (Packages)
        run: |
          find packages -name "pubspec.yaml" -maxdepth 2 -execdir flutter pub get \;

      - name: Get Dependencies (App)
        run: |
          cd kalkra_app
          flutter pub get

      - name: Refresh macOS Project
        run: |
          cd kalkra_app
          flutter create --platforms=macos .

      - name: Build macOS Release
        run: |
          cd kalkra_app
          flutter build macos --release

      - name: Zip Build
        run: |
          cd kalkra_app/build/macos/Build/Products/Release
          # Check if the app exists and zip it.
          if [ -d "Kalkra.app" ]; then
            zip -r ../../../../Kalkra-macOS.zip Kalkra.app
          elif [ -d "kalkra_app.app" ]; then
            zip -r ../../../../Kalkra-macOS.zip kalkra_app.app
          else
            echo "Searching for built .app file..."
            APP_NAME=$(find . -name "*.app" -maxdepth 1)
            if [ -n "$APP_NAME" ]; then
              zip -r ../../../../Kalkra-macOS.zip "$APP_NAME"
            else
              echo "Error: No .app file found in $(pwd)"
              ls -R
              exit 1
            fi
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalkra-macOS
          path: Kalkra-macOS.zip
