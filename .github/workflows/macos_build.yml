name: Build macOS Executable
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          cd kalkra_app
          flutter pub get

      - name: Enable macOS support
        run: flutter config --enable-macos-desktop

      - name: Build macOS Release
        run: |
          cd kalkra_app
          flutter build macos --release --no-codesign

      - name: Zip Build
        run: |
          cd kalkra_app/build/macos/Build/Products/Release
          zip -r ../../../../Kalkra-macOS.zip Kalkra.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalkra-macOS
          path: Kalkra-macOS.zip
