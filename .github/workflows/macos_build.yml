name: Build macOS Executable
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable macOS support
        run: flutter config --enable-macos-desktop

      - name: Get Dependencies (Packages)
        run: |
          find packages -name "pubspec.yaml" -maxdepth 2 -execdir flutter pub get \;

      - name: Get Dependencies (App)
        run: |
          cd kalkra_app
          flutter pub get

      - name: Build macOS Release
        run: |
          cd kalkra_app
          # We don't refresh the project here to keep existing settings, 
          # but we ensure dependencies are correct.
          flutter build macos --release

      - name: Zip Build
        run: |
          # Find any .app file in the build directory and zip it
          APP_PATH=$(find kalkra_app/build/macos/Build/Products/Release -name "*.app" -maxdepth 1)
          if [ -n "$APP_PATH" ]; then
            echo "Found app at $APP_PATH"
            zip -r Kalkra-macOS.zip "$APP_PATH"
          else
            echo "Error: No .app file found in build directory."
            find kalkra_app/build -name "*.app"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kalkra-macOS
          path: Kalkra-macOS.zip
