<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Kalkra Geometric App Icon - Centered Symbols -->
  <defs>
    <mask id="centeredNegSpace">
      <rect width="100" height="100" fill="white" />
      
      <!-- Central Explosion Cross (Negative Space) -->
      <rect x="47" y="0" width="6" height="100" fill="black" />
      <rect x="0" y="47" width="100" height="6" fill="black" />
      
      <!-- Rounded Operator Cutouts (Centered in quadrants) -->
      <!-- TL Quadrant (Center: 26, 26) -->
      <!-- PLUS -->
      <rect x="17" y="24" width="18" height="4" rx="2" fill="black" />
      <rect x="24" y="17" width="4" height="18" rx="2" fill="black" />
      
      <!-- TR Quadrant (Center: 74, 26) -->
      <!-- MINUS -->
      <rect x="65" y="24" width="18" height="4" rx="2" fill="black" />
      
      <!-- BL Quadrant (Center: 26, 74) -->
      <!-- MULTIPLY -->
      <g transform="translate(26, 74) rotate(45)">
        <rect x="-9" y="-2" width="18" height="4" rx="2" fill="black" />
        <rect x="-2" y="-9" width="4" height="18" rx="2" fill="black" />
      </g>
      
      <!-- BR Quadrant (Center: 74, 74) -->
      <!-- DIVIDE -->
      <rect x="65" y="72" width="18" height="4" rx="2" fill="black" />
      <circle cx="74" cy="65" r="3" fill="black" />
      <circle cx="74" cy="83" r="3" fill="black" />
    </mask>
  </defs>

  <g mask="url(#centeredNegSpace)">
    <!-- Quadrant 1: Cyan (Rounded TL) -->
    <path d="M20 5 h27 v42 h-42 v-27 Q5 5 20 5" fill="#00E5FF" />
    
    <!-- Quadrant 2: Pink (Rounded TR) -->
    <path d="M53 5 h27 Q95 5 95 20 v27 h-42 z" fill="#FF4081" />
    
    <!-- Quadrant 3: Purple (Rounded BL) -->
    <path d="M5 53 h42 v42 h-27 Q5 95 5 80 z" fill="#7C4DFF" />
    
    <!-- Quadrant 4: Yellow (Rounded BR) -->
    <path d="M53 53 h42 v27 Q95 95 80 95 h-27 z" fill="#FFEE58" />
  </g>
</svg>
